services:
  postgres:
    image: postgres:16-alpine
    container_name: nod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nod
      POSTGRES_PASSWORD: nod_dev_pw
      POSTGRES_DB: nod
    ports:
      - "5433:5432"
    volumes:
      - nod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nod -d nod"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nod_pgdata:
